<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tech Market — E-Commerce Premium de Tecnología</title>
  <meta name="description"
    content="Tech Market: tu destino para los mejores productos de tecnología. GPUs, audio, almacenamiento y monitores gaming." />
  <meta name="theme-color" content="#0B0D17" />
  <link rel="icon"
    href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
    rel="stylesheet" />

  <!-- Tailwind CSS Play CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            dark: { 900: '#0B0D17', 800: '#111427', 700: '#161A2E', 600: '#1C2039', 500: '#242844' },
            neon: { cyan: '#00E5FF', purple: '#B026FF', pink: '#FF2D95' }
          },
          fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] },
          animation: {
            'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
            'float': 'float 6s ease-in-out infinite',
            'glow': 'glow 2s ease-in-out infinite alternate',
          },
          keyframes: {
            float: { '0%, 100%': { transform: 'translateY(0)' }, '50%': { transform: 'translateY(-10px)' } },
            glow: { '0%': { boxShadow: '0 0 20px #00E5FF30' }, '100%': { boxShadow: '0 0 40px #00E5FF50, 0 0 80px #B026FF20' } }
          }
        }
      }
    }
  </script>

  <style>
    *,
    *::before,
    *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: #0B0D17;
      color: #f0f0f5;
      overflow-x: hidden;
    }

    ::-webkit-scrollbar {
      width: 6px;
    }

    ::-webkit-scrollbar-track {
      background: #0B0D17;
    }

    ::-webkit-scrollbar-thumb {
      background: #242844;
      border-radius: 99px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #00E5FF40;
    }

    .magnifier-container {
      cursor: crosshair;
    }

    @keyframes skeleton-pulse {

      0%,
      100% {
        opacity: 0.4;
      }

      50% {
        opacity: 0.15;
      }
    }

    .skeleton-pulse {
      animation: skeleton-pulse 1.8s ease-in-out infinite;
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
      }

      to {
        opacity: 1;
      }
    }

    @keyframes slideInRight {
      from {
        opacity: 0;
        transform: translateX(100px);
      }

      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    @keyframes slideInUp {
      from {
        opacity: 0;
        transform: translateY(20px) scale(0.95);
      }

      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    @keyframes bounceIn {
      0% {
        transform: scale(0);
      }

      50% {
        transform: scale(1.15);
      }

      100% {
        transform: scale(1);
      }
    }

    .anim-slideUp {
      animation: slideUp 0.5s ease both;
    }

    .anim-fadeIn {
      animation: fadeIn 0.3s ease both;
    }

    .anim-slideInRight {
      animation: slideInRight 0.4s ease both;
    }

    .anim-slideInUp {
      animation: slideInUp 0.35s ease both;
    }

    .anim-bounceIn {
      animation: bounceIn 0.4s ease both;
    }

    .card-hover {
      transition: all 0.35s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }

    .card-hover:hover {
      transform: translateY(-8px);
      box-shadow: 0 0 15px #00E5FF40, 0 0 30px #00E5FF15;
      border-color: #00E5FF50;
    }

    .neon-btn {
      background: linear-gradient(135deg, #00E5FF, #B026FF);
      transition: all 0.3s ease;
    }

    .neon-btn:hover {
      box-shadow: 0 0 25px #00E5FF60, 0 0 50px #B026FF30;
      transform: scale(1.03);
    }

    .glass {
      background: rgba(11, 13, 23, 0.8);
      backdrop-filter: blur(20px) saturate(180%);
      -webkit-backdrop-filter: blur(20px) saturate(180%);
    }

    .chat-msg-bot {
      background: linear-gradient(135deg, #111427, #1C2039);
    }

    .chat-msg-user {
      background: linear-gradient(135deg, #00E5FF15, #B026FF15);
      border: 1px solid #00E5FF30;
    }
  </style>
</head>

<body>
  <div id="root"></div>

  <!-- Product Data -->
  <script src="data/products.js"></script>

  <!-- React 18 UMD -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

  <!-- Babel Standalone (JSX compilation) -->
  <script src="https://unpkg.com/@babel/standalone@7/babel.min.js"></script>

  <!-- App (compiled by Babel at runtime) -->
  <script type="text/babel" data-type="module">
    // ═══════════════════════════════════════════════════════════
    //  TECH MARKET — Premium E-Commerce Frontend
    //  React 18 • Tailwind CSS • CSS Animations • Lucide SVGs
    // ═══════════════════════════════════════════════════════════

    const { useState, useEffect, useRef, useContext, createContext, useCallback, useMemo } = React;

    // ─── SVG Icon Components (Lucide-equivalent) ────────────────────
    const Icon = ({ d, size = 20, className = "", stroke = "currentColor", fill = "none" }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24"
        fill={fill} stroke={stroke} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
        {Array.isArray(d) ? d.map((p, i) => <path key={i} d={p} />) : <path d={d} />}
      </svg>
    );

    const Icons = {
      Search: (p) => <Icon {...p} d="M21 21l-4.35-4.35M11 19a8 8 0 100-16 8 8 0 000 16z" />,
      ShoppingCart: (p) => <Icon {...p} d={["M9 22a1 1 0 100-2 1 1 0 000 2z", "M20 22a1 1 0 100-2 1 1 0 000 2z", "M1 1h4l2.68 13.39a2 2 0 002 1.61h9.72a2 2 0 002-1.61L23 6H6"]} />,
      User: (p) => <Icon {...p} d={["M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2", "M12 3a4 4 0 100 8 4 4 0 000-8z"]} />,
      Mail: (p) => <Icon {...p} d={["M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z", "M22 6l-10 7L2 6"]} />,
      Phone: (p) => <Icon {...p} d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07 19.5 19.5 0 01-6-6A19.79 19.79 0 012.12 4.18 2 2 0 014.11 2h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L8.09 9.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 16.92z" />,
      Github: (p) => <Icon {...p} d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 00-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0020 4.77 5.07 5.07 0 0019.91 1S18.73.65 16 2.48a13.38 13.38 0 00-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 005 4.77a5.44 5.44 0 00-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 009 18.13V22" />,
      Linkedin: (p) => <Icon {...p} d={["M16 8a6 6 0 016 6v7h-4v-7a2 2 0 00-4 0v7h-4v-7a6 6 0 016-6z", "M2 9h4v12H2z", "M4 2a2 2 0 100 4 2 2 0 000-4z"]} />,
      X: (p) => <Icon {...p} d={["M18 6L6 18", "M6 6l12 12"]} />,
      MessageCircle: (p) => <Icon {...p} d="M21 11.5a8.38 8.38 0 01-.9 3.8 8.5 8.5 0 01-7.6 4.7 8.38 8.38 0 01-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 01-.9-3.8 8.5 8.5 0 014.7-7.6 8.38 8.38 0 013.8-.9h.5a8.48 8.48 0 018 8v.5z" />,
      Send: (p) => <Icon {...p} d={["M22 2L11 13", "M22 2l-7 20-4-9-9-4 20-7z"]} />,
      Check: (p) => <Icon {...p} d="M20 6L9 17l-5-5" />,
      Zap: (p) => <Icon {...p} d="M13 2L3 14h9l-1 8 10-12h-9l1-8z" />,
      Star: (p) => <Icon {...p} d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z" />,
      ChevronRight: (p) => <Icon {...p} d="M9 18l6-6-6-6" />,
      Minus: (p) => <Icon {...p} d="M5 12h14" />,
      Plus: (p) => <Icon {...p} d={["M12 5v14", "M5 12h14"]} />,
      Package: (p) => <Icon {...p} d={["M16.5 9.4l-9-5.19", "M21 16V8a2 2 0 00-1-1.73l-7-4a2 2 0 00-2 0l-7 4A2 2 0 003 8v8a2 2 0 001 1.73l7 4a2 2 0 002 0l7-4A2 2 0 0021 16z", "M3.27 6.96L12 12.01l8.73-5.05", "M12 22.08V12"]} />,
      Truck: (p) => <Icon {...p} d={["M1 3h15v13H1z", "M16 8h4l3 3v5h-7V8z", "M5.5 21.5a2.5 2.5 0 100-5 2.5 2.5 0 000 5z", "M18.5 21.5a2.5 2.5 0 100-5 2.5 2.5 0 000 5z"]} />,
      Shield: (p) => <Icon {...p} d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" />,
    };


    // ═══════════════════════════════════════════
    //  STORE CONTEXT (Global State)
    // ═══════════════════════════════════════════
    const StoreContext = createContext();

    function StoreProvider({ children }) {
      const [cart, setCart] = useState([]);
      const [activeProduct, setActiveProduct] = useState(null);
      const [searchQuery, setSearchQuery] = useState("");
      const [toast, setToast] = useState({ visible: false, productName: "" });

      const addToCart = useCallback((product) => {
        setCart(prev => {
          const existing = prev.find(item => item.product.id === product.id);
          if (existing) return prev.map(item => item.product.id === product.id ? { ...item, quantity: item.quantity + 1 } : item);
          return [...prev, { product, quantity: 1 }];
        });
        setToast({ visible: true, productName: product.name });
      }, []);

      const cartCount = useMemo(() => cart.reduce((sum, item) => sum + item.quantity, 0), [cart]);

      const value = useMemo(() => ({
        cart, addToCart, cartCount, activeProduct, setActiveProduct, searchQuery, setSearchQuery, toast, setToast
      }), [cart, addToCart, cartCount, activeProduct, searchQuery, toast]);

      return <StoreContext.Provider value={value}>{children}</StoreContext.Provider>;
    }

    function useStore() { return useContext(StoreContext); }


    // ═══════════════════════════════════════════
    //  TOP BAR
    // ═══════════════════════════════════════════
    function TopBar() {
      return (
        <div className="bg-dark-800 border-b border-white/5 h-8 flex items-center justify-between px-4 md:px-6 text-[11px] text-gray-500 select-none">
          <div className="flex items-center gap-4">
            <a href="mailto:contacto@techmarket.co" className="hidden sm:flex items-center gap-1.5 hover:text-neon-cyan transition-colors duration-300">
              <Icons.Mail size={11} /> contacto@techmarket.co
            </a>
            <a href="https://wa.me/573001234567" target="_blank" className="flex items-center gap-1.5 hover:text-neon-cyan transition-colors duration-300">
              <Icons.Phone size={11} /> +57 300 123 4567
            </a>
          </div>
          <div className="flex items-center gap-3">
            <a href="https://github.com" target="_blank" className="hover:text-neon-cyan transition-colors duration-300"><Icons.Github size={13} /></a>
            <a href="https://linkedin.com" target="_blank" className="hover:text-neon-cyan transition-colors duration-300"><Icons.Linkedin size={13} /></a>
          </div>
        </div>
      );
    }


    // ═══════════════════════════════════════════
    //  HEADER (Glassmorphism Navbar)
    // ═══════════════════════════════════════════
    function Header() {
      const { searchQuery, setSearchQuery, cartCount } = useStore();

      return (
        <nav className="sticky top-0 z-50 glass border-b border-white/5">
          <div className="max-w-7xl mx-auto px-4 md:px-6 h-16 flex items-center justify-between gap-4">
            {/* Logo */}
            <div className="flex items-center gap-2.5 shrink-0">
              <div className="w-9 h-9 bg-gradient-to-br from-neon-cyan to-neon-purple rounded-xl flex items-center justify-center shadow-lg shadow-neon-cyan/20">
                <Icons.Zap size={18} className="text-white" />
              </div>
              <span className="font-extrabold text-lg tracking-tight">
                Tech<span className="text-neon-cyan">Market</span>
              </span>
            </div>

            {/* Search */}
            <div className="flex-1 max-w-lg">
              <div className="relative">
                <Icons.Search size={16} className="absolute left-3 top-1/2 -translate-y-1/2 text-gray-500 pointer-events-none" />
                <input
                  type="text" placeholder="Buscar productos..." value={searchQuery}
                  onChange={(e) => setSearchQuery(e.target.value)}
                  className="w-full pl-10 pr-4 py-2.5 bg-dark-700/80 border border-white/[0.06] rounded-xl text-sm text-white placeholder-gray-500 focus:outline-none focus:border-neon-cyan/40 focus:shadow-[0_0_20px_#00E5FF15] transition-all duration-300"
                />
              </div>
            </div>

            {/* Right actions */}
            <div className="flex items-center gap-2 shrink-0">
              <button className="relative p-2.5 text-gray-400 hover:text-neon-cyan transition-colors duration-300 rounded-xl hover:bg-white/5">
                <Icons.ShoppingCart size={20} />
                {cartCount > 0 && (
                  <span className="absolute -top-0.5 -right-0.5 min-w-[18px] h-[18px] px-1 bg-neon-cyan text-dark-900 text-[10px] font-bold rounded-full flex items-center justify-center anim-bounceIn">
                    {cartCount}
                  </span>
                )}
              </button>
              <button className="p-2.5 text-gray-400 hover:text-neon-cyan transition-colors duration-300 rounded-xl hover:bg-white/5">
                <Icons.User size={20} />
              </button>
            </div>
          </div>
        </nav>
      );
    }


    // ═══════════════════════════════════════════
    //  SKELETON CARD (Loading State)
    // ═══════════════════════════════════════════
    function SkeletonCard() {
      return (
        <div className="bg-dark-700/50 border border-white/[0.04] rounded-2xl overflow-hidden">
          <div className="h-56 bg-dark-600/50 skeleton-pulse" />
          <div className="p-5 space-y-3">
            <div className="h-3 w-20 bg-dark-600/60 rounded-full skeleton-pulse" />
            <div className="h-5 w-3/4 bg-dark-600/60 rounded-lg skeleton-pulse" style={{ animationDelay: '0.1s' }} />
            <div className="h-3 w-full bg-dark-600/60 rounded-lg skeleton-pulse" style={{ animationDelay: '0.2s' }} />
            <div className="h-3 w-2/3 bg-dark-600/60 rounded-lg skeleton-pulse" style={{ animationDelay: '0.3s' }} />
            <div className="flex justify-between items-center pt-2">
              <div className="h-7 w-24 bg-dark-600/60 rounded-lg skeleton-pulse" style={{ animationDelay: '0.4s' }} />
              <div className="h-9 w-9 bg-dark-600/60 rounded-xl skeleton-pulse" style={{ animationDelay: '0.5s' }} />
            </div>
          </div>
        </div>
      );
    }


    // ═══════════════════════════════════════════
    //  PRODUCT CARD
    // ═══════════════════════════════════════════
    function ProductCard({ product, index }) {
      const { setActiveProduct } = useStore();

      return (
        <div
          className="anim-slideUp bg-dark-700/30 border border-white/[0.06] rounded-2xl overflow-hidden cursor-pointer card-hover group"
          style={{ animationDelay: `${index * 0.1}s` }}
          onClick={() => setActiveProduct(product)}
        >
          {/* Image */}
          <div className="relative h-56 bg-dark-800/50 overflow-hidden">
            <img
              src={product.mainImage} alt={product.name} loading="lazy"
              className="w-full h-full object-contain p-6 transition-transform duration-500 group-hover:scale-110"
              onError={(e) => { e.target.onerror = null; e.target.src = 'https://placehold.co/400x300/111427/374151?text=' + encodeURIComponent(product.name); }}
            />
            <div className="absolute top-3 left-3">
              <span className="px-2.5 py-1 text-[10px] font-semibold uppercase tracking-wider bg-neon-cyan/10 text-neon-cyan border border-neon-cyan/20 rounded-lg">
                {product.category}
              </span>
            </div>
            {/* Hover overlay */}
            <div className="absolute inset-0 bg-gradient-to-t from-dark-900/60 via-transparent to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-300 flex items-end justify-center pb-4">
              <span className="text-xs text-white/80 flex items-center gap-1">
                <Icons.Search size={12} /> Vista rápida
              </span>
            </div>
          </div>

          {/* Body */}
          <div className="p-5">
            <h3 className="font-semibold text-[15px] text-white mb-1.5 line-clamp-1">{product.name}</h3>
            <p className="text-xs text-gray-500 line-clamp-2 mb-4 leading-relaxed">{product.shortDesc}</p>
            <div className="flex items-center justify-between">
              <span className="text-xl font-extrabold bg-gradient-to-r from-neon-cyan to-neon-purple bg-clip-text text-transparent">
                ${product.price.toLocaleString('en-US')}
              </span>
              <div className="w-9 h-9 rounded-xl bg-neon-cyan/10 border border-neon-cyan/20 flex items-center justify-center text-neon-cyan group-hover:bg-neon-cyan group-hover:text-dark-900 transition-all duration-300">
                <Icons.Plus size={16} />
              </div>
            </div>
          </div>
        </div>
      );
    }


    // ═══════════════════════════════════════════
    //  PRODUCT GRID
    // ═══════════════════════════════════════════
    function ProductGrid() {
      const { searchQuery } = useStore();
      const [loading, setLoading] = useState(true);

      useEffect(() => {
        const timer = setTimeout(() => setLoading(false), 1200);
        return () => clearTimeout(timer);
      }, []);

      const filtered = useMemo(() => {
        if (!searchQuery.trim()) return window.PRODUCTS;
        const q = searchQuery.toLowerCase();
        return window.PRODUCTS.filter(p => p.name.toLowerCase().includes(q) || p.category.toLowerCase().includes(q));
      }, [searchQuery]);

      return (
        <section className="max-w-7xl mx-auto px-4 md:px-6 py-10">
          {/* Section header */}
          <div className="flex items-center justify-between mb-8">
            <div>
              <h2 className="text-2xl font-bold">Productos <span className="text-neon-cyan">Destacados</span></h2>
              <p className="text-sm text-gray-500 mt-1">{loading ? 'Cargando...' : `${filtered.length} producto${filtered.length !== 1 ? 's' : ''}`}</p>
            </div>
            <div className="flex items-center gap-2 text-xs text-gray-500">
              <Icons.Package size={14} /> Envío gratis +$500
            </div>
          </div>

          {/* Grid */}
          <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-5">
            {loading
              ? Array.from({ length: 4 }).map((_, i) => <SkeletonCard key={i} />)
              : filtered.length > 0
                ? filtered.map((product, i) => <ProductCard key={product.id} product={product} index={i} />)
                : (
                  <div className="col-span-full text-center py-20">
                    <Icons.Search size={40} className="mx-auto text-gray-600 mb-4" />
                    <p className="text-gray-400 font-medium">Sin resultados para "{searchQuery}"</p>
                    <p className="text-gray-600 text-sm mt-1">Intenta con otro término de búsqueda</p>
                  </div>
                )
            }
          </div>
        </section>
      );
    }


    // ═══════════════════════════════════════════
    //  IMAGE MAGNIFIER
    // ═══════════════════════════════════════════
    function ImageMagnifier({ src, alt }) {
      const [magnify, setMagnify] = useState(false);
      const [pos, setPos] = useState({ x: 50, y: 50 });
      const containerRef = useRef(null);

      const handleMouseMove = useCallback((e) => {
        const rect = containerRef.current.getBoundingClientRect();
        const x = ((e.clientX - rect.left) / rect.width) * 100;
        const y = ((e.clientY - rect.top) / rect.height) * 100;
        setPos({ x: Math.max(0, Math.min(100, x)), y: Math.max(0, Math.min(100, y)) });
      }, []);

      return (
        <div
          ref={containerRef}
          className="magnifier-container relative w-full h-full overflow-hidden rounded-xl bg-dark-800"
          onMouseEnter={() => setMagnify(true)}
          onMouseLeave={() => setMagnify(false)}
          onMouseMove={handleMouseMove}
        >
          <img src={src} alt={alt} className={`w-full h-full object-contain p-4 transition-opacity duration-200 ${magnify ? 'opacity-0' : 'opacity-100'}`}
            onError={(e) => { e.target.onerror = null; e.target.src = 'https://placehold.co/600x400/111427/374151?text=Imagen'; }}
          />
          {magnify && (
            <div
              className="absolute inset-0"
              style={{
                backgroundImage: `url('${src}')`,
                backgroundSize: '250%',
                backgroundPosition: `${pos.x}% ${pos.y}%`,
                backgroundRepeat: 'no-repeat',
              }}
            />
          )}
          {!magnify && (
            <div className="absolute bottom-3 right-3 text-[10px] text-gray-500 bg-dark-900/70 px-2 py-1 rounded-md">
              🔍 Hover para zoom
            </div>
          )}
        </div>
      );
    }


    // ═══════════════════════════════════════════
    //  PRODUCT MODAL (Quick View)
    // ═══════════════════════════════════════════
    function ProductModal() {
      const { activeProduct, setActiveProduct, addToCart } = useStore();
      const [selectedImage, setSelectedImage] = useState(0);
      const [isClosing, setIsClosing] = useState(false);

      useEffect(() => { setSelectedImage(0); setIsClosing(false); }, [activeProduct]);

      useEffect(() => {
        if (activeProduct) document.body.style.overflow = 'hidden';
        else document.body.style.overflow = '';
        return () => { document.body.style.overflow = ''; };
      }, [activeProduct]);

      const handleClose = useCallback(() => {
        setIsClosing(true);
        setTimeout(() => { setActiveProduct(null); setIsClosing(false); }, 250);
      }, [setActiveProduct]);

      if (!activeProduct) return null;
      const p = activeProduct;
      const currentImg = p.gallery[selectedImage] || p.mainImage;

      return (
        <div className={`fixed inset-0 z-[100] flex items-center justify-center p-4 ${isClosing ? 'anim-fadeOut' : 'anim-fadeIn'}`}>
          {/* Overlay */}
          <div className="absolute inset-0 bg-black/70 backdrop-blur-sm" onClick={handleClose} />

          {/* Modal */}
          <div className={`relative w-full max-w-5xl max-h-[90vh] bg-dark-800 border border-white/[0.08] rounded-2xl overflow-hidden flex flex-col lg:flex-row ${isClosing ? '' : 'anim-slideInUp'}`}
            style={{ animationDelay: '0.05s' }}
          >
            {/* Close button */}
            <button onClick={handleClose} className="absolute top-4 right-4 z-10 w-8 h-8 rounded-lg bg-dark-700/80 border border-white/10 flex items-center justify-center text-gray-400 hover:text-white hover:border-neon-cyan/40 transition-all duration-200">
              <Icons.X size={16} />
            </button>

            {/* LEFT: Gallery */}
            <div className="lg:w-[55%] p-5 flex flex-col gap-3">
              {/* Main image with magnifier */}
              <div className="flex-1 min-h-[280px] lg:min-h-[380px]">
                <ImageMagnifier src={currentImg} alt={p.name} />
              </div>
              {/* Thumbnails */}
              <div className="flex gap-2">
                {p.gallery.map((img, i) => (
                  <button
                    key={i} onClick={() => setSelectedImage(i)}
                    className={`w-16 h-16 rounded-lg overflow-hidden border-2 transition-all duration-200 flex-shrink-0 ${i === selectedImage ? 'border-neon-cyan shadow-[0_0_10px_#00E5FF30]' : 'border-white/[0.06] hover:border-white/20'
                      }`}
                  >
                    <img src={img} alt={`${p.name} ${i + 1}`} className="w-full h-full object-contain bg-dark-700 p-1"
                      onError={(e) => { e.target.onerror = null; e.target.src = 'https://placehold.co/80x80/161A2E/374151?text=' + (i + 1); }}
                    />
                  </button>
                ))}
              </div>
            </div>

            {/* RIGHT: Info */}
            <div className="lg:w-[45%] p-6 lg:p-8 border-t lg:border-t-0 lg:border-l border-white/[0.06] overflow-y-auto">
              <span className="inline-block px-2.5 py-1 text-[10px] font-semibold uppercase tracking-wider bg-neon-purple/10 text-neon-purple border border-neon-purple/20 rounded-lg mb-3">
                {p.category}
              </span>
              <h2 className="text-2xl font-bold mb-2">{p.name}</h2>
              <div className="text-3xl font-extrabold bg-gradient-to-r from-neon-cyan to-neon-purple bg-clip-text text-transparent mb-4">
                ${p.price.toLocaleString('en-US')}
              </div>
              <p className="text-sm text-gray-400 leading-relaxed mb-6">{p.shortDesc}</p>

              {/* Specs table */}
              <div className="mb-6">
                <h4 className="text-xs font-semibold uppercase tracking-wider text-gray-500 mb-3">Especificaciones</h4>
                <div className="bg-dark-700/40 rounded-xl border border-white/[0.04] overflow-hidden">
                  {Object.entries(p.specs).map(([key, val], i) => (
                    <div key={key} className={`flex justify-between px-4 py-2.5 text-sm ${i % 2 === 0 ? 'bg-white/[0.01]' : ''} ${i < Object.entries(p.specs).length - 1 ? 'border-b border-white/[0.04]' : ''}`}>
                      <span className="text-gray-500">{key}</span>
                      <span className="text-white font-medium">{val}</span>
                    </div>
                  ))}
                </div>
              </div>

              {/* Features */}
              <div className="flex items-center gap-4 text-[11px] text-gray-500 mb-6">
                <span className="flex items-center gap-1"><Icons.Truck size={13} /> Envío gratis</span>
                <span className="flex items-center gap-1"><Icons.Shield size={13} /> Garantía 1 año</span>
                <span className="flex items-center gap-1"><Icons.Star size={13} /> Top ventas</span>
              </div>

              {/* Add to cart */}
              <button
                onClick={() => addToCart(p)}
                className="w-full neon-btn text-white font-semibold py-3.5 rounded-xl flex items-center justify-center gap-2 text-sm"
              >
                <Icons.ShoppingCart size={18} /> Añadir al Carrito
              </button>
            </div>
          </div>
        </div>
      );
    }


    // ═══════════════════════════════════════════
    //  TOAST NOTIFICATION
    // ═══════════════════════════════════════════
    function Toast() {
      const { toast, setToast } = useStore();

      useEffect(() => {
        if (toast.visible) {
          const timer = setTimeout(() => setToast({ visible: false, productName: '' }), 3500);
          return () => clearTimeout(timer);
        }
      }, [toast.visible]);

      if (!toast.visible) return null;

      return (
        <div className="fixed top-24 right-4 z-[110] anim-slideInRight">
          <div className="bg-dark-700 border border-neon-cyan/30 rounded-xl px-4 py-3 shadow-xl shadow-neon-cyan/10 flex items-center gap-3 max-w-xs">
            <div className="w-8 h-8 rounded-lg bg-neon-cyan/10 flex items-center justify-center shrink-0">
              <Icons.Check size={16} className="text-neon-cyan" />
            </div>
            <div>
              <p className="text-sm font-medium text-white">Añadido al carrito</p>
              <p className="text-[11px] text-gray-400 line-clamp-1">{toast.productName}</p>
            </div>
            <button onClick={() => setToast({ visible: false, productName: '' })} className="text-gray-500 hover:text-white ml-2">
              <Icons.X size={14} />
            </button>
          </div>
        </div>
      );
    }


    // ═══════════════════════════════════════════
    //  CHATBOT — Context-Aware Sales Assistant
    // ═══════════════════════════════════════════
    /*
     * ── SYSTEM PROMPT (para integración futura con IA) ──────────
     * "Eres el asesor experto de Tech Market. No inventes descuentos,
     *  no hables de temas ajenos a la tecnología. Tu objetivo es usar
     *  el JSON de productos para resaltar los beneficios técnicos,
     *  comparar opciones objetivamente e impulsar la compra de manera
     *  profesional."
     */
    const SYSTEM_PROMPT = `Eres el asesor experto de Tech Market. No inventes descuentos, no hables de temas ajenos a la tecnología. Tu objetivo es usar el JSON de productos para resaltar los beneficios técnicos, comparar opciones objetivamente e impulsar la compra de manera profesional.`;

    function getBotResponse(msg, activeProduct) {
      const m = msg.toLowerCase();
      if (m.includes('precio') || m.includes('cuesta') || m.includes('valor')) {
        if (activeProduct) return `El ${activeProduct.name} tiene un precio de $${activeProduct.price.toLocaleString('en-US')}. Es una de las mejores opciones calidad-precio de su categoría. ¿Te gustaría saber más sobre sus especificaciones?`;
        return 'Tenemos productos para todos los presupuestos. ¿Qué tipo de producto te interesa?';
      }
      if (m.includes('envío') || m.includes('envio') || m.includes('entrega')) {
        return '🚚 Ofrecemos envío gratuito en pedidos superiores a $500. El tiempo de entrega es de 3-5 días hábiles a nivel nacional.';
      }
      if (m.includes('garantía') || m.includes('garantia')) {
        return '🛡️ Todos nuestros productos cuentan con garantía de 1 año contra defectos de fábrica. En productos seleccionados ofrecemos garantía extendida de hasta 3 años.';
      }
      if (m.includes('espec') || m.includes('caract') || m.includes('detalle')) {
        if (activeProduct) {
          const specs = Object.entries(activeProduct.specs).map(([k, v]) => `• ${k}: ${v}`).join('\n');
          return `📋 Especificaciones del ${activeProduct.name}:\n${specs}\n\n¿Alguna duda sobre alguna especificación en particular?`;
        }
        return 'Puedo darte las especificaciones detalladas de cualquier producto. ¿Cuál te interesa?';
      }
      if (m.includes('comparar') || m.includes('diferencia') || m.includes('mejor')) {
        return '🔍 Puedo ayudarte a comparar productos. Dime qué dos productos te interesan y te daré un análisis objetivo de sus ventajas y diferencias.';
      }
      if (m.includes('hola') || m.includes('hi') || m.includes('buenas') || m.includes('buenos')) {
        return '¡Hola! 👋 Soy el asistente de Tech Market. Estoy aquí para ayudarte a encontrar el producto perfecto. ¿En qué puedo ayudarte?';
      }
      if (m.includes('gracias') || m.includes('thanks')) {
        return '¡Con gusto! 😊 Si tienes más preguntas, no dudes en consultarme. ¡Estoy aquí para ayudarte!';
      }
      if (activeProduct) {
        return `El ${activeProduct.name} es una excelente elección en la categoría de ${activeProduct.category}. ${activeProduct.shortDesc} ¿Necesitas que te ayude con algo específico?`;
      }
      return 'Entiendo tu consulta. Te puedo ayudar con información sobre precios, especificaciones, envíos o garantías. ¿Qué necesitas?';
    }

    function Chatbot() {
      const { activeProduct } = useStore();
      const [isOpen, setIsOpen] = useState(false);
      const [messages, setMessages] = useState([]);
      const [input, setInput] = useState('');
      const [typing, setTyping] = useState(false);
      const messagesEndRef = useRef(null);
      const prevProductRef = useRef(null);

      const scrollToBottom = useCallback(() => {
        messagesEndRef.current?.scrollIntoView({ behavior: 'smooth' });
      }, []);

      useEffect(() => { scrollToBottom(); }, [messages, typing]);

      const addBotMessage = useCallback((text) => {
        setTyping(true);
        setTimeout(() => {
          setMessages(prev => [...prev, { role: 'bot', text }]);
          setTyping(false);
        }, 600 + Math.random() * 600);
      }, []);

      const handleOpen = useCallback(() => {
        setIsOpen(true);
        if (messages.length === 0) {
          if (activeProduct) {
            addBotMessage(`¡Hola! 👋 Veo que estás mirando el ${activeProduct.name}. ¿Tienes alguna duda sobre sus especificaciones o compatibilidad?`);
          } else {
            addBotMessage('¡Hola! 👋 Soy el asistente virtual de Tech Market. ¿En qué puedo ayudarte hoy?');
          }
        }
      }, [messages.length, activeProduct, addBotMessage]);

      // Dynamic greeting when product changes while chat is open
      useEffect(() => {
        if (isOpen && activeProduct && activeProduct.id !== prevProductRef.current?.id && messages.length > 0) {
          addBotMessage(`Veo que ahora estás mirando el ${activeProduct.name}. ¿Te puedo ayudar con alguna duda sobre este producto?`);
        }
        prevProductRef.current = activeProduct;
      }, [activeProduct, isOpen]);

      const handleSend = useCallback(() => {
        if (!input.trim()) return;
        const userMsg = input.trim();
        setMessages(prev => [...prev, { role: 'user', text: userMsg }]);
        setInput('');
        addBotMessage(getBotResponse(userMsg, activeProduct));
      }, [input, activeProduct, addBotMessage]);

      return (
        <>
          {/* Float button */}
          {!isOpen && (
            <button
              onClick={handleOpen}
              className="fixed bottom-6 right-6 z-[90] w-14 h-14 rounded-full neon-btn flex items-center justify-center shadow-xl shadow-neon-cyan/30 anim-bounceIn animate-glow"
              title="Asistente Virtual"
            >
              <Icons.MessageCircle size={24} className="text-white" />
            </button>
          )}

          {/* Chat Window */}
          {isOpen && (
            <div className="fixed bottom-6 right-6 z-[90] w-[370px] max-w-[calc(100vw-2rem)] h-[520px] max-h-[calc(100vh-6rem)] bg-dark-800 border border-white/[0.08] rounded-2xl shadow-2xl shadow-black/50 flex flex-col overflow-hidden anim-slideInUp">
              {/* Header */}
              <div className="px-4 py-3 border-b border-white/[0.06] flex items-center justify-between shrink-0 bg-gradient-to-r from-dark-700 to-dark-800">
                <div className="flex items-center gap-2.5">
                  <div className="w-8 h-8 rounded-lg bg-gradient-to-br from-neon-cyan to-neon-purple flex items-center justify-center">
                    <Icons.Zap size={14} className="text-white" />
                  </div>
                  <div>
                    <p className="text-sm font-semibold text-white">Tech Assistant</p>
                    <p className="text-[10px] text-neon-cyan flex items-center gap-1">
                      <span className="w-1.5 h-1.5 rounded-full bg-neon-cyan inline-block" /> En línea
                    </p>
                  </div>
                </div>
                <button onClick={() => setIsOpen(false)} className="text-gray-500 hover:text-white transition-colors p-1">
                  <Icons.X size={18} />
                </button>
              </div>

              {/* Messages */}
              <div className="flex-1 overflow-y-auto p-4 space-y-3">
                {messages.map((msg, i) => (
                  <div key={i} className={`flex ${msg.role === 'user' ? 'justify-end' : 'justify-start'}`}>
                    <div className={`max-w-[85%] px-3.5 py-2.5 rounded-xl text-[13px] leading-relaxed whitespace-pre-line ${msg.role === 'user' ? 'chat-msg-user text-white' : 'chat-msg-bot text-gray-300'
                      }`}>
                      {msg.text}
                    </div>
                  </div>
                ))}
                {typing && (
                  <div className="flex justify-start">
                    <div className="chat-msg-bot px-4 py-3 rounded-xl flex items-center gap-1">
                      <span className="w-2 h-2 bg-gray-500 rounded-full animate-bounce" style={{ animationDelay: '0ms' }} />
                      <span className="w-2 h-2 bg-gray-500 rounded-full animate-bounce" style={{ animationDelay: '150ms' }} />
                      <span className="w-2 h-2 bg-gray-500 rounded-full animate-bounce" style={{ animationDelay: '300ms' }} />
                    </div>
                  </div>
                )}
                <div ref={messagesEndRef} />
              </div>

              {/* Input */}
              <div className="p-3 border-t border-white/[0.06] shrink-0">
                <div className="flex gap-2">
                  <input
                    type="text" value={input}
                    onChange={(e) => setInput(e.target.value)}
                    onKeyDown={(e) => e.key === 'Enter' && handleSend()}
                    placeholder="Escribe tu pregunta..."
                    className="flex-1 px-3.5 py-2.5 bg-dark-700 border border-white/[0.06] rounded-xl text-sm text-white placeholder-gray-600 focus:outline-none focus:border-neon-cyan/30 transition-colors"
                  />
                  <button onClick={handleSend} className="w-10 h-10 rounded-xl neon-btn flex items-center justify-center shrink-0">
                    <Icons.Send size={16} className="text-white" />
                  </button>
                </div>
              </div>
            </div>
          )}
        </>
      );
    }


    // ═══════════════════════════════════════════
    //  HERO SECTION
    // ═══════════════════════════════════════════
    function Hero() {
      return (
        <section className="relative max-w-7xl mx-auto px-4 md:px-6 pt-12 pb-6 text-center overflow-hidden">
          {/* Ambient blobs */}
          <div className="absolute top-0 left-1/4 w-96 h-96 bg-neon-cyan/5 rounded-full blur-[120px] pointer-events-none" />
          <div className="absolute bottom-0 right-1/4 w-80 h-80 bg-neon-purple/5 rounded-full blur-[100px] pointer-events-none" />

          <span className="inline-flex items-center gap-1.5 px-3 py-1 text-[11px] font-semibold uppercase tracking-wider bg-neon-cyan/5 text-neon-cyan border border-neon-cyan/15 rounded-full mb-5 anim-slideUp">
            <Icons.Zap size={12} /> Nuevos productos 2026
          </span>
          <h1 className="text-3xl md:text-5xl font-black tracking-tight mb-4 anim-slideUp" style={{ animationDelay: '0.1s' }}>
            La mejor tecnología al <br className="hidden md:block" />
            <span className="bg-gradient-to-r from-neon-cyan via-neon-purple to-neon-pink bg-clip-text text-transparent">alcance de un click</span>
          </h1>
          <p className="text-gray-500 text-sm md:text-base max-w-lg mx-auto anim-slideUp" style={{ animationDelay: '0.2s' }}>
            GPUs de última generación, audio premium, almacenamiento ultrarrápido y monitores gaming. Todo con envío gratis y garantía.
          </p>
        </section>
      );
    }


    // ═══════════════════════════════════════════
    //  APP (Main Orchestrator)
    // ═══════════════════════════════════════════
    function App() {
      return (
        <StoreProvider>
          <div className="min-h-screen bg-dark-900 text-white">
            <TopBar />
            <Header />
            <Hero />
            <ProductGrid />
            <ProductModal />
            <Toast />
            <Chatbot />
            {/* Footer */}
            <footer className="border-t border-white/[0.04] py-8 mt-10">
              <div className="max-w-7xl mx-auto px-4 md:px-6 flex flex-col md:flex-row items-center justify-between gap-4 text-xs text-gray-600">
                <p>&copy; 2026 Tech Market. Todos los derechos reservados.</p>
                <div className="flex items-center gap-4">
                  <span className="flex items-center gap-1"><Icons.Truck size={12} /> Envío gratis +$500</span>
                  <span className="flex items-center gap-1"><Icons.Shield size={12} /> Garantía</span>
                  <span className="flex items-center gap-1"><Icons.Star size={12} /> Top calidad</span>
                </div>
              </div>
            </footer>
          </div>
        </StoreProvider>
      );
    }


    // ═══════════════════════════════════════════
    //  MOUNT
    // ═══════════════════════════════════════════
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>

</html>
